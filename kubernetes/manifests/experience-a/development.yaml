apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    secret.reloader.stakater.com/reload: development-config-files
  labels:
    app.kubernetes.io/component: app-server
    app.kubernetes.io/instance: development
    app.kubernetes.io/name: experience-a
    app.kubernetes.io/version: 0.1.1
  name: development-app-server
  namespace: development-experience-a
spec:
  minReadySeconds: 0
  progressDeadlineSeconds: 600
  replicas: 2
  selector:
    matchLabels:
      cdk8s.io/metadata.addr: development-app-server-c8547929
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: app-server
        app.kubernetes.io/instance: development
        app.kubernetes.io/name: experience-a
        app.kubernetes.io/version: 0.1.1
        cdk8s.io/metadata.addr: development-app-server-c8547929
    spec:
      automountServiceAccountToken: false
      containers:
        - command:
            - node
            - /app/applications/experience-a/dist/app-server.js
          env:
            - name: CONFIG_FILE_PATH
              value: /app/config.json
          image: ghcr.io/mxvincent/experience-a:0.1.1
          imagePullPolicy: Always
          name: app-server
          ports:
            - containerPort: 4000
              name: http
          resources:
            limits:
              memory: 250Mi
            requests:
              cpu: 50m
              memory: 100Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - mountPath: /app/config.json
              name: secret-development-config-files
              subPath: config.json
      dnsPolicy: ClusterFirst
      hostNetwork: false
      restartPolicy: Always
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: Always
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      setHostnameAsFQDN: false
      terminationGracePeriodSeconds: 30
      volumes:
        - name: secret-development-config-files
          secret:
            secretName: development-config-files
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: app-server
    app.kubernetes.io/instance: development
    app.kubernetes.io/name: experience-a
    app.kubernetes.io/version: 0.1.1
  name: development-app-server
  namespace: development-experience-a
spec:
  externalIPs: []
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  selector:
    cdk8s.io/metadata.addr: development-app-server-c8547929
  type: ClusterIP
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/instance: development
    app.kubernetes.io/name: experience-a
    app.kubernetes.io/version: 0.1.1
  name: development-config-files-secrets
  namespace: development-experience-a
spec:
  data:
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: name:development-experience-a
        metadataPolicy: None
        property: POSTGRES_DATABASE
        version: latest
      secretKey: DEVELOPMENT_EXPERIENCE_A_POSTGRES_DATABASE
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: name:development-experience-a
        metadataPolicy: None
        property: POSTGRES_USERNAME
        version: latest
      secretKey: DEVELOPMENT_EXPERIENCE_A_POSTGRES_USERNAME
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: name:development-experience-a
        metadataPolicy: None
        property: POSTGRES_PASSWORD
        version: latest
      secretKey: DEVELOPMENT_EXPERIENCE_A_POSTGRES_PASSWORD
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: scaleway
  target:
    creationPolicy: Owner
    name: development-config-files
    template:
      data:
        config.json: '{"logLevel":"info","database":{"type":"postgres","host":"postgres-15-postgresql.postgres-15.svc.cluster.local","port":5432,"database":"{{ .DEVELOPMENT_EXPERIENCE_A_POSTGRES_DATABASE | toString }}","username":"{{ .DEVELOPMENT_EXPERIENCE_A_POSTGRES_USERNAME | toString }}","password":"{{ .DEVELOPMENT_EXPERIENCE_A_POSTGRES_PASSWORD | toString }}"}}'
      engineVersion: v2
