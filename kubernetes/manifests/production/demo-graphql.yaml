apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/instance: production
    app.kubernetes.io/name: demo-graphql
    app.kubernetes.io/version: 0.1.0
  name: production-demo-graphql
  namespace: production-demo-graphql
spec: {}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/instance: production
    app.kubernetes.io/name: demo-graphql
    app.kubernetes.io/version: 0.1.0
  name: demo-graphql-docker-auth-secret
  namespace: production-demo-graphql
spec:
  data:
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: name:docker-auth
        version: latest
      secretKey: secret
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: scaleway
  target:
    creationPolicy: Owner
    name: demo-graphql-docker-auth
    template:
      data:
        .dockerconfigjson: "{{ .secret | toString }}"
      type: kubernetes.io/dockerconfigjson
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/instance: production
    app.kubernetes.io/name: demo-graphql
    app.kubernetes.io/version: 0.1.0
  name: demo-graphql-config-files-secrets
  namespace: production-demo-graphql
spec:
  data:
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: name:production-demo-graphql
        property: DATABASE_USERNAME
        version: latest
      secretKey: PRODUCTION_DEMO_GRAPHQL_DATABASE_USERNAME
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: name:production-demo-graphql
        property: DATABASE_PASSWORD
        version: latest
      secretKey: PRODUCTION_DEMO_GRAPHQL_DATABASE_PASSWORD
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: scaleway
  target:
    creationPolicy: Owner
    name: demo-graphql-config-files
    template:
      data:
        config.json: '{"logLevel":"info","database":{"type":"postgres","host":"postgres-15-postgresql.postgres-15.svc.cluster.local","port":5432,"database":"production-demo-graphql","username":"{{ .PRODUCTION_DEMO_GRAPHQL_DATABASE_USERNAME | toString }}","password":"{{ .PRODUCTION_DEMO_GRAPHQL_DATABASE_PASSWORD | toString }}"}}'
      engineVersion: "2"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    secret.reloader.stakater.com/reload: demo-graphql-config-files
  labels:
    app.kubernetes.io/component: app-server
    app.kubernetes.io/instance: production
    app.kubernetes.io/name: demo-graphql
    app.kubernetes.io/version: 0.1.0
  name: demo-graphql-app-server
  namespace: production-demo-graphql
spec:
  minReadySeconds: 0
  progressDeadlineSeconds: 600
  replicas: 1
  selector:
    matchLabels:
      cdk8s.io/metadata.addr: demo-graphql-app-server-c8feae02
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: app-server
        app.kubernetes.io/instance: production
        app.kubernetes.io/name: demo-graphql
        app.kubernetes.io/version: 0.1.0
        cdk8s.io/metadata.addr: demo-graphql-app-server-c8feae02
    spec:
      automountServiceAccountToken: false
      containers:
        - command:
            - node
            - /app/applications/demo-graphql/dist/app-server.js
          env:
            - name: CONFIG_FILE_PATH
              value: /app/config.json
          image: ghcr.io/mxvincent/demo-graphql:0.1.0
          imagePullPolicy: Always
          name: app-server
          ports:
            - containerPort: 4000
              name: http
          resources:
            limits:
              memory: 250Mi
            requests:
              cpu: 50m
              memory: 100Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: false
          volumeMounts:
            - mountPath: /app/config.json
              name: secret-demo-graphql-config-files
              subPath: config.json
      dnsPolicy: ClusterFirst
      hostNetwork: false
      imagePullSecrets:
        - name: demo-graphql-docker-auth
      restartPolicy: Always
      securityContext:
        fsGroupChangePolicy: Always
        runAsNonRoot: true
      setHostnameAsFQDN: false
      terminationGracePeriodSeconds: 30
      volumes:
        - name: secret-demo-graphql-config-files
          secret:
            secretName: demo-graphql-config-files
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: app-server
    app.kubernetes.io/instance: production
    app.kubernetes.io/name: demo-graphql
    app.kubernetes.io/version: 0.1.0
  name: demo-graphql-app-server
  namespace: production-demo-graphql
spec:
  externalIPs: []
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  selector:
    cdk8s.io/metadata.addr: demo-graphql-app-server-c8feae02
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: acme
    ingress.kubernetes.io/ssl-redirect: "true"
  labels:
    app.kubernetes.io/component: app-server
    app.kubernetes.io/instance: production
    app.kubernetes.io/name: demo-graphql
    app.kubernetes.io/version: 0.1.0
  name: demo-graphql-app-server
  namespace: production-demo-graphql
spec:
  rules:
    - host: demo-graphql.row.ovh
      http:
        paths:
          - backend:
              service:
                name: demo-graphql-app-server
                port:
                  number: 4000
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - demo-graphql.row.ovh
      secretName: demo-graphql-app-server-cert
