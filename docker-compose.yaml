name: node-packages
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: node-packages
      POSTGRES_PASSWORD: node-packages
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: node-packages
      RABBITMQ_DEFAULT_PASS: node-packages
      RABBITMQ_DEFAULT_VHOST: node-packages
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - "rabbitmq-data:/var/lib/rabbitmq"
  jaeger:
    image: jaegertracing/all-in-one:1.59
    platform: linux/arm64
    environment:
      - COLLECTOR_OTLP_GRPC_HOST_PORT=0.0.0.0:4317
      - COLLECTOR_OTLP_HTTP_HOST_PORT=0.0.0.0:4318
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
  app:
    image: ghcr.io/mxvincent/experience-b:latest
    command:
      - node
      - /app/dist/app-server.js
    platform: linux/arm64
    environment:
      - NODE_ENV=production
      - SERVER_HOST=0.0.0.0
      - POSTGRES_DATABASE=experience-a
    ports:
      - "4000:4000"
volumes:
  rabbitmq-data:
  postgres-data:

